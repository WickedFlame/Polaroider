# http://www.appveyor.com/docs/appveyor-yml

environment:
  base_version: 2.5.2

# version format
version: $(base_version).{build}

image:
  - Visual Studio 2022

skip_tags: true
branches:
  only:
    - master
    - dev

for:
  - 
    # branches to build
    branches:
      # whitelist
      only:
        - dev

    # Do not build on tags (GitHub only)
    skip_tags: true

    install:
      - ps: |
          Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile "$env:TEMP\dotnet-install.ps1"
          & "$env:TEMP\dotnet-install.ps1" -Channel 10.0 -Quality preview -InstallDir "$env:ProgramFiles\dotnet"
          $env:Path = "$env:ProgramFiles\dotnet;$env:Path"
          dotnet --info
      - dotnet tool install Nuke.GlobalTool --global --no-cache

    before_build:
      - dotnet restore ./build/_build.csproj

    build_script:
      - nuke Release --isrc true --version "%base_version%" --buildno "%APPVEYOR_BUILD_NUMBER%" --configuration Release

  - 
    # branches to build
    branches:
      # whitelist
      only:
        - master

    # Do not build on tags (GitHub only)
    skip_tags: true

    install:
      - ps: |
          Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile "$env:TEMP\dotnet-install.ps1"
          & "$env:TEMP\dotnet-install.ps1" -Channel 10.0 -Quality preview -InstallDir "$env:ProgramFiles\dotnet"
          $env:Path = "$env:ProgramFiles\dotnet;$env:Path"
          dotnet --info
      - dotnet tool install Nuke.GlobalTool --global --no-cache

    before_build:
      - dotnet restore ./build/_build.csproj

    build_script:
      - nuke Release --isrc false --version "%base_version%" --buildno "%APPVEYOR_BUILD_NUMBER%" --configuration Release

artifacts:
  - path: src\Polaroider\bin\Release\netstandard2.0\Polaroider.dll
    name: Polaroider.dll
  - path: src\Polaroider\bin\Release\netstandard2.0\Polaroider.xml
    name: Polaroider.xml
  # pushing all *.nupkg files in directory
  - path: 'src\**\*.nupkg'
